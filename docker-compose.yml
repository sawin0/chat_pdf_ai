services:
  api:
    build: .
    container_name: pdf_ai_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./tmp:/app/tmp

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant_db
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_storage:/root/.ollama
    restart: unless-stopped
    command: ["serve"]


volumes:
  qdrant_storage:
  ollama_storage:
